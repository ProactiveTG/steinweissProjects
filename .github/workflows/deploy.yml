name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build aquasocius-website
        working-directory: aquasocius-website
        run: npm ci && npm run build

      - name: Build aquasocius-command
        working-directory: aquasocius-command
        run: npm ci && npm run build

      - name: Build aquasocius-portal
        working-directory: aquasocius-portal
        run: npm ci && npm run build

      - name: Build global-utility-monitoring
        working-directory: global-utility-monitoring
        run: npm ci && npm run build

      - name: Assemble combined output
        run: |
          mkdir -p dist
          cp -r aquasocius-website/out/. dist/
          mkdir -p dist/command
          cp -r aquasocius-command/out/. dist/command/
          mkdir -p dist/portal
          cp -r aquasocius-portal/out/. dist/portal/
          mkdir -p dist/rusk
          cp -r global-utility-monitoring/out/. dist/rusk/
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
